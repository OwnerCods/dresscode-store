services:
  - type: web
    name: dresscode-api
    env: node
    region: frankfurt
    plan: free
    rootDir: ./server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_IDS
        value: 5845575815
